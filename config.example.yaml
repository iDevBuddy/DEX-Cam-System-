# DEX AI Monitoring System — configuration
# Copy this file to config.yaml and edit your cameras.
# Cameras can also be added live from the dashboard (they get saved to config.yaml).

inference:
  model: models/yolo11s.pt   # yolo11n.pt on very weak CPUs
  # Track START threshold. Detection runs down to 0.12 internally; weak
  # detections keep existing tracks alive (two-threshold tracking).
  confidence: 0.35
  infer_fps: 2          # AI passes per second per camera (video stays smooth)
  imgsz: 512            # 640 on GPU builds
  use_reid: true        # OSNet person re-identification (persistent worker IDs)
  enhance: true         # auto gamma/CLAHE on dark or washed-out frames

activity:
  idle_after_minutes: 7                # away from every machine this long => IDLE (range 5-10)
  machine_switch_window_seconds: 45    # machine A -> B inside this = continuous ACTIVE
  machine_motion_threshold: 3.0        # motion energy for RUNNING (per-zone: motion_threshold)
  sitting_alert_minutes: 3             # sitting at a machine this long => POSTURE alert
  use_pose: true                       # posture info + compliance (never decides active/idle)
  movement_window: 3.0                 # object-filter movement memory
  movement_threshold: 0.015

alerts:
  cooldown_seconds: 60
  phone_cooldown_seconds: 30
  unmanned_after_seconds: 120
  idle_worker_cooldown_seconds: 300
  posture_cooldown_seconds: 600

cameras:
- name: sample-video
  source: sample.mp4    # RTSP URL | video file path | 0 for webcam
  max_workers: 3        # overcrowding alert above this count
  zone:                 # work zone polygon, normalized 0..1 coords
  - [0.03, 0.1]
  - [0.97, 0.1]
  - [0.97, 0.97]
  - [0.03, 0.97]
  # Machine areas: a worker standing inside one counts as ACTIVE (working);
  # away from every machine zone (or sitting) counts as IDLE.
  machine_zones:
  - name: machine-1
    zone: [[0.10, 0.30], [0.45, 0.30], [0.45, 0.95], [0.10, 0.95]]
